<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Parcelas</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: #f8f9fa; color: #3c4043; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background-color: #ffffff; border: 1px solid #dadce0; border-radius: 8px; width: 100%; max-width: 1200px; padding: 15px; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); }
        h2 { margin-top: 0; color: #1a73e8; font-size: 22px; border-bottom: 2px solid #e8eaed; padding-bottom: 12px; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background-color: #f1f3f4; color: #5f6368; font-weight: 600; padding: 10px 4px; border: 1px solid #dadce0; font-size: 13px; text-align: center; }
        td { padding: 8px 4px; border: 1px solid #dadce0; vertical-align: middle; font-size: 13px; text-align: center; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        .col-pol { width: 8%; }
        .col-num { width: 8%; font-weight: bold; }
        
        /* Estilo para los 3 cuadraditos de la columna Hecho */
        .col-hecho-triple { width: 16%; }
        .flex-checks { display: flex; justify-content: center; gap: 12px; }
        .chk-box-label { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #5f6368; font-weight: bold; }
        
        /* Estilo para el cuadradito único de Tratamiento */
        .col-tratamiento-check { width: 10%; }
        
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; accent-color: #1a73e8; margin-bottom: 3px; }
        .col-fecha { width: 13%; color: #3c4043; font-family: monospace; font-size: 13px; }
        .col-nombre { width: 22%; text-align: left; }
        
        .input-nombre { 
            width: 100%; min-width: 160px; min-height: 40px; max-height: 120px;
            padding: 6px 10px; border: 1px solid #dadce0; border-radius: 4px; 
            outline: none; resize: vertical; font-size: 13px;
        }
        .input-nombre:focus { border-color: #1a73e8; }
        .status-bar { background: #e8f0fe; color: #1a73e8; padding: 8px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 15px; display: none; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Parcelas Real</h2>
    <div id="status" class="status-bar">Sincronizando con Google Sheets...</div>
    
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Nº Polígono</th>
                    <th>Nº Parcela</th>
                    <th>Hecho</th>
                    <th>Fecha de Registro</th>
                    <th>Tratamiento</th>
                    <th>Fecha de Registro</th>
                    <th>Nombre Parcela</th>
                </tr>
            </thead>
            <tbody id="tabla-parcelas">
                <tr><td colspan="7" style="text-align:center; padding:20px; color:#5f6368;">Cargando parcelas reales...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const URL_API = 'https://script.google.com/macros/s/AKfycbze9oKK_oEHStZDEOV_DnetmAT6ifmOMVvPSCR7E03lgKISNGeuXJ_UDuX_LljitonK/exec'; 
    
    let listaGlobalParcelas = [];
    let temporizadorGuardado;

    window.onload = function() {
        cargarDatosDesdeNube();
    };

    function cargarDatosDesdeNube() {
        mostrarEstado("Sincronizando lista con Google Sheets...");
        fetch(URL_API)
        .then(res => res.json())
        .then(lista => {
            listaGlobalParcelas = lista;
            const tbody = document.getElementById('tabla-parcelas');
            tbody.innerHTML = '';

            if(!lista || lista.length === 0) { 
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px;">La hoja está vacía.</td></tr>`;
                return; 
            }
            
            lista.forEach((p, index) => {
                const tr = document.createElement('tr');
                tr.id = `fila-${index}`;
                tr.innerHTML = `
                    <td class="col-pol">${p.poligono}</td>
                    <td class="col-num">${p.id}</td>
                    
                    <td class="col-hecho-triple">
                        <div class="flex-checks">
                            <label class="chk-box-label"><input type="checkbox" class="chk-c1" ${p.c1 ? 'checked' : ''} onchange="toggleCheck(${index}, 'c1', 'fecha1')">1º</label>
                            <label class="chk-box-label"><input type="checkbox" class="chk-c2" ${p.c2 ? 'checked' : ''} onchange="toggleCheck(${index}, 'c2', 'fecha2')">2º</label>
                            <label class="chk-box-label"><input type="checkbox" class="chk-c3" ${p.c3 ? 'checked' : ''} onchange="toggleCheck(${index}, 'c3', 'fecha3'); sincronizarCheckTratamiento(${index}, true)">3º</label>
                        </div>
                    </td>
                    
                    <td class="col-fecha" id="fecha1-${index}">${p.fecha1}</td>
                    
                    <td class="col-tratamiento-check">
                        <input type="checkbox" class="chk-tratamiento" ${p.tratamientoCheck ? 'checked' : ''} onchange="toggleTratamientoCheck(${index})">
                    </td>
                    
                    <td class="col-fecha" id="fecha3-${index}">${p.fecha3}</td>
                    
                    <td class="col-nombre"><textarea class="input-nombre" placeholder="Escribe el nombre..." oninput="autoExpand(this); programarGuardado(${index})">${p.nombre}</textarea></td>
                `;
                tbody.appendChild(tr);
                
                setTimeout(() => {
                    const txt = tr.querySelector('.input-nombre');
                    if(txt) autoExpand(txt);
                }, 50);
            });
            mostrarEstado("Datos cargados correctamente ✔️");
        })
        .catch(() => mostrarEstado("❌ No se pudo conectar con Google Sheets"));
    }

    function autoExpand(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    // Controla los 3 cuadraditos de la columna "Hecho"
    function toggleCheck(index, claseCheck, idDestinoFecha) {
        const checkbox = document.querySelector(`#fila-${index} .chk-${claseCheck}`);
        const celdaFecha = document.getElementById(`${idDestinoFecha}-${index}`);
        
        if (checkbox.checked) {
            const ahora = new Date();
            celdaFecha.textContent = `${String(ahora.getDate()).padStart(2,'0')}/${String(ahora.getMonth()+1).padStart(2,'0')}/${ahora.getFullYear()}`;
        } else {
            celdaFecha.textContent = "-";
        }
        enviarDatosANube();
    }

    // Controla el cuadradito de la columna "Tratamiento" que escribe en la última fecha de registro
    function toggleTratamientoCheck(index) {
        const checkboxTrat = document.querySelector(`#fila-${index} .chk-tratamiento`);
        const celdaFecha3 = document.getElementById(`fecha3-${index}`);
        const checkboxC3 = document.querySelector(`#fila-${index} .chk-c3`);

        if (checkboxTrat.checked) {
            const ahora = new Date();
            const fechaHoy = `${String(ahora.getDate()).padStart(2,'0')}/${String(ahora.getMonth()+1).padStart(2,'0')}/${ahora.getFullYear()}`;
            celdaFecha3.textContent = fechaHoy;
            checkboxC3.checked = true; // Sincroniza el 3º check de hecho automáticamente
        } else {
            celdaFecha3.textContent = "-";
            checkboxC3.checked = false; // Desmarca el 3º de hecho también
        }
        enviarDatosANube();
    }

    // Hace que si marcas el 3º botón de hecho, se marque visualmente el de tratamiento
    function sincronizarCheckTratamiento(index, activar) {
        const checkboxC3 = document.querySelector(`#fila-${index} .chk-c3`);
        const checkboxTrat = document.querySelector(`#fila-${index} .chk-tratamiento`);
        checkboxTrat.checked = checkboxC3.checked;
    }

    function programarGuardado(index) {
        clearTimeout(temporizadorGuardado);
        mostrarEstado("Escribiendo...");
        temporizadorGuardado = setTimeout(enviarDatosANube, 1000); 
    }

    function enviarDatosANube() {
        mostrarEstado("Guardando en la nube...");
        const datos = [];
        
        listaGlobalParcelas.forEach((p, index) => {
            const fila = document.getElementById(`fila-${index}`);
            if (fila) {
                datos.push({
                    id: p.id,
                    c1: fila.querySelector('.chk-c1').checked,
                    c2: fila.querySelector('.chk-c2').checked,
                    c3: fila.querySelector('.chk-c3').checked,
                    fecha1: document.getElementById(`fecha1-${index}`).textContent,
                    fecha2: fila.querySelector('.chk-c2').checked ? document.getElementById(`fecha2-${index || 0}`).textContent : "-", // Guarda la fecha 2 en Tratamiento Excel si Hecho 2 está marcado
                    fecha3: document.getElementById(`fecha3-${index}`).textContent,
                    nombre: fila.querySelector('.input-nombre').value
                });
            }
        });

        fetch(URL_API, { 
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos) 
        })
        .then(() => mostrarEstado("Datos guardados en la nube ✔️"))
        .catch(() => mostrarEstado("❌ Error al guardar"));
    }

    function mostrarEstado(msg) {
        const div = document.getElementById("status");
        div.style.display = "block";
        div.textContent = msg;
    }
</script>
</body>
</html>
